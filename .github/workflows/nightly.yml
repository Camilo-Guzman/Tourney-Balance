name: Build and Push Mod

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'core/**'
      - 'resource_packages/**'
      - 'TourneyBalance.mod'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # --- OPTIMIZATION: SDK CACHE ---
      - name: Cache Vermintide 2 SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: D:\v2_sdk
          # If you ever need to force a fresh SDK download, change 'v1' to 'v2' below
          key: ${{ runner.os }}-v2-sdk-866060-v1

      - name: Setup SteamCMD
        uses: andriivitiv/setup-steamcmd@v1

      - name: Warm-up Steam Session
        shell: cmd
        env:
          STEAM_USER: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASS: ${{ secrets.STEAM_PASSWORD }}
        run: |
          steamcmd +login %STEAM_USER% %STEAM_PASS% +quit

      - name: Install Legacy Runtimes (DirectX & VC++)
        shell: pwsh
        run: |
          Write-Host "Installing Visual C++ Redistributables..."
          choco install vcredist2010 vcredist2012 vcredist2013 vcredist140 -y
          Write-Host "Installing DirectX Runtimes..."
          choco install directx -y

      - name: Install Vermintide 2 Mod SDK
        # This step only runs if the cache was NOT found
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          steamcmd +force_install_dir "D:\v2_sdk" +login ${{ secrets.STEAM_USERNAME }} ${{ secrets.STEAM_PASSWORD }} +app_update 866060 validate +quit

      - name: Configure and Build Mod
        shell: pwsh
        run: |
          # 1. Setup Staging
          $stagingDir = "mods/TourneyBalance"
          if (Test-Path $stagingDir) { Remove-Item $stagingDir -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stagingDir
          Get-ChildItem -Exclude "mods", "tools", ".github", ".git", ".vmbrc", "bundleV2" | Copy-Item -Destination $stagingDir -Recurse -Force

          # 2. Patch .vmbrc 
          $sdkPath = "D:/v2_sdk/"
          if (Test-Path "D:/v2_sdk/Vermintide 2 SDK/") { $sdkPath = "D:/v2_sdk/Vermintide 2 SDK/" }
          
          $config = Get-Content .vmbrc | ConvertFrom-Json
          $config.mods_dir = "mods"
          $config.use_fallback = $true
          $config.fallback_tools_dir2 = $sdkPath
          $config.fallback_steamapps_dir2 = "D:/v2_sdk/"
          $config | ConvertTo-Json | Set-Content .vmbrc

          # 3. Build
          Write-Host "Building using SDK at: $sdkPath"
          .\tools\vmb.exe build "TourneyBalance" -g 2

      - name: Verify Build Artifacts
        shell: pwsh
        run: |
          $bundlePath = "$env:GITHUB_WORKSPACE/bundleV2"
          Write-Host "Checking for files in: $bundlePath"
          # List files for debugging logs
          Get-ChildItem -Path $bundlePath -Recurse
          
          if (!(Test-Path "$bundlePath/*.mod_bundle")) {
              Write-Error "CRITICAL: No .mod_bundle files found in $bundlePath! The build likely failed silently."
              exit 1
          }
          Write-Host "Success: Build artifacts verified."

      - name: Prepare and Upload to Steam
        shell: pwsh
        env:
          STEAM_USER: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASS: ${{ secrets.STEAM_PASSWORD }}
        run: |
          $cleanPath = $env:GITHUB_WORKSPACE.Replace('\', '/')
          
          $vdf = @"
          "workshopitem"
          {
            "appid"            "552500"
            "publishedfileid"  "${{ secrets.WORKSHOP_ID }}"
            "contentfolder"    "$cleanPath/bundleV2"
            "changenote"       "Automated build from GitHub: $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
          }
          "@
          $vdf | Out-File -FilePath "upload.vdf" -Encoding utf8
          
          # We capture the output and check for the word "Success" case-insensitively
          $output = steamcmd +login $env:STEAM_USER $env:STEAM_PASS +workshop_build_item "$cleanPath/upload.vdf" +quit | Out-String
          Write-Host $output

          if ($output -notlike "*Success*") {
              Write-Error "SteamCMD failed to update. Check the log above for 'Logon Denied' or 'Access Denied'."
              exit 1
          }


