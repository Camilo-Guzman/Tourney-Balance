name: Build and Push Mod

on:
  push:
    branches:
      - main  # Make sure this matches your branch name (main or master)
    paths:
      - 'scripts/**'
      - 'core/**'
      - 'resource_packages/**'
      - 'TourneyBalance.mod'
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  build:
    runs-on: windows-2022 # Pinning to 2022 to avoid the 2025 redirect warnings

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # FIXED: Updated the SteamCMD setup action name
      - name: Setup SteamCMD
        uses: andriivitiv/setup-steamcmd@v1

      - name: Install Legacy Runtimes (DirectX & VC++)
        shell: pwsh
        run: |
          # 1. Install VC++ 2010, 2012, 2013, and 2015-2022 (Both x86 and x64)
          # Stingray tools are notorious for needing the 2010/2012 versions.
          Write-Host "Installing Visual C++ Redistributables..."
          choco install vcredist2010 vcredist2012 vcredist2013 vcredist140 -y

          # 2. Install DirectX End-User Runtimes (June 2010)
          # Many Stingray compilers require d3dcompiler_43.dll or X3DAudio1_7.dll
          Write-Host "Installing DirectX Runtimes..."
          choco install directx -y

      - name: Install Vermintide 2 Mod SDK
        shell: cmd
        run: |
          steamcmd +force_install_dir "D:\v2_sdk" +login ${{ secrets.STEAM_USERNAME }} ${{ secrets.STEAM_PASSWORD }} +app_update 866060 validate +quit

      - name: Configure and Build Mod
        shell: pwsh
        run: |
          # 1. Setup Staging
          $stagingDir = "mods/TourneyBalance"
          if (Test-Path $stagingDir) { Remove-Item $stagingDir -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stagingDir
          Get-ChildItem -Exclude "mods", "tools", ".github", ".git", ".vmbrc", "bundleV2" | Copy-Item -Destination $stagingDir -Recurse -Force

          # 2. Patch .vmbrc 
          # We check two possible paths for the SDK content
          $sdkPath = "D:/v2_sdk/"
          if (Test-Path "D:/v2_sdk/Vermintide 2 SDK/") { $sdkPath = "D:/v2_sdk/Vermintide 2 SDK/" }
          
          $config = Get-Content .vmbrc | ConvertFrom-Json
          $config.mods_dir = "mods"
          $config.use_fallback = $true
          $config.fallback_tools_dir2 = $sdkPath
          $config.fallback_steamapps_dir2 = "D:/v2_sdk/"
          $config | ConvertTo-Json | Set-Content .vmbrc

          # 3. Build with Error Checking
          Write-Host "Building using SDK at: $sdkPath"
          .\tools\vmb.exe build "TourneyBalance" -g 2

      - name: Prepare SteamCMD Upload Script
        shell: pwsh
        run: |
          $vdf = @"
          "workshopitem"
          {
            "appid"            "552500"
            "publishedfileid"  "${{ secrets.WORKSHOP_ID }}"
            "contentfolder"    "$env:GITHUB_WORKSPACE\bundleV2"
            "changenote"       "Automated build from GitHub: $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
          }
          "@
          $vdf | Out-File -FilePath "upload.vdf" -Encoding utf8

      - name: Upload to Steam Workshop
        shell: cmd
        env:
          STEAM_USER: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASS: ${{ secrets.STEAM_PASSWORD }}
        run: |
          steamcmd +login %STEAM_USER% %STEAM_PASS% +workshop_build_item "%GITHUB_WORKSPACE%\upload.vdf" +quit